<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>별빛 정원 — 계절 시뮬레이션</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/season.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body class="season-page">

  <!-- 상단 바 -->
  <div class="season-topbar">
    <a href="simulation.html" class="back-btn">← 돌아가기</a>
    <div class="season-topbar-center">
      <span id="topEmoji">🌸</span>
      <span id="topSeason">봄</span>
      <span id="topYear">2026년</span>
    </div>
    <div class="topbar-stats">
      <span>열섬 <strong id="topHeat">–0.0C</strong></span>
      <span>H' <strong id="topShannon">3.8</strong></span>
    </div>
  </div>

  <!-- 슬라이드 -->
  <div class="season-slide-wrap">
    <button class="season-arrow left" id="btnLeft">&#8249;</button>

    <div class="season-viewport">
      <div class="season-track" id="seasonTrack">

        <!-- 봄 -->
        <div class="season-panel" data-season="spring">
          <div class="panel-bg" style="background-image:url('assets/images/spring.jpg')">
            <div class="panel-fallback spring-fallback"></div>
          </div>
          <div class="panel-overlay"></div>
          <div class="panel-model">
            <canvas id="canvas-spring" class="model-canvas"></canvas>
            <div class="panel-placeholder" id="placeholder-spring">
              <p>🌸 봄 정원 모델링</p>
              <p class="ph-sub">models/garden.glb 연결 예정</p>
            </div>
          </div>
          <div class="panel-info">
            <div class="growth-row">
              <span class="growth-label-text">생장 달성률</span>
              <div class="growth-track">
                <div class="growth-fill" id="growth-spring"></div>
              </div>
              <span class="growth-pct" id="growthPct-spring">0%</span>
            </div>
            <div class="bloom-chips" id="blooming-spring"></div>
            <div class="animal-layer" id="animals-spring"></div>
          </div>
        </div>

        <!-- 여름 -->
        <div class="season-panel" data-season="summer">
          <div class="panel-bg" style="background-image:url('assets/images/summer.jpg')">
            <div class="panel-fallback summer-fallback"></div>
          </div>
          <div class="panel-overlay"></div>
          <div class="panel-model">
            <canvas id="canvas-summer" class="model-canvas"></canvas>
            <div class="panel-placeholder" id="placeholder-summer">
              <p>☀️ 여름 정원 모델링</p>
              <p class="ph-sub">models/garden.glb 연결 예정</p>
            </div>
          </div>
          <div class="panel-info">
            <div class="growth-row">
              <span class="growth-label-text">생장 달성률</span>
              <div class="growth-track">
                <div class="growth-fill" id="growth-summer"></div>
              </div>
              <span class="growth-pct" id="growthPct-summer">0%</span>
            </div>
            <div class="bloom-chips" id="blooming-summer"></div>
            <div class="animal-layer" id="animals-summer"></div>
          </div>
        </div>

        <!-- 가을 -->
        <div class="season-panel" data-season="autumn">
          <div class="panel-bg" style="background-image:url('assets/images/autumn.jpg')">
            <div class="panel-fallback autumn-fallback"></div>
          </div>
          <div class="panel-overlay"></div>
          <div class="panel-model">
            <canvas id="canvas-autumn" class="model-canvas"></canvas>
            <div class="panel-placeholder" id="placeholder-autumn">
              <p>🍂 가을 정원 모델링</p>
              <p class="ph-sub">models/garden.glb 연결 예정</p>
            </div>
          </div>
          <div class="panel-info">
            <div class="growth-row">
              <span class="growth-label-text">생장 달성률</span>
              <div class="growth-track">
                <div class="growth-fill" id="growth-autumn"></div>
              </div>
              <span class="growth-pct" id="growthPct-autumn">0%</span>
            </div>
            <div class="bloom-chips" id="blooming-autumn"></div>
            <div class="animal-layer" id="animals-autumn"></div>
          </div>
        </div>

        <!-- 겨울 -->
        <div class="season-panel" data-season="winter">
          <div class="panel-bg" style="background-image:url('assets/images/winter.jpg')">
            <div class="panel-fallback winter-fallback"></div>
          </div>
          <div class="panel-overlay"></div>
          <div class="panel-model">
            <canvas id="canvas-winter" class="model-canvas"></canvas>
            <div class="panel-placeholder" id="placeholder-winter">
              <p>❄️ 겨울 정원 모델링</p>
              <p class="ph-sub">models/garden.glb 연결 예정</p>
            </div>
          </div>
          <div class="panel-info">
            <div class="growth-row">
              <span class="growth-label-text">생장 달성률</span>
              <div class="growth-track">
                <div class="growth-fill" id="growth-winter"></div>
              </div>
              <span class="growth-pct" id="growthPct-winter">0%</span>
            </div>
            <div class="bloom-chips" id="blooming-winter"></div>
            <div class="animal-layer" id="animals-winter"></div>
          </div>
        </div>

      </div>
    </div>

    <button class="season-arrow right" id="btnRight">&#8250;</button>
  </div>

  <!-- 인디케이터 -->
  <div class="season-dots">
    <span class="dot active" id="dot-0">🌸</span>
    <span class="dot" id="dot-1">☀️</span>
    <span class="dot" id="dot-2">🍂</span>
    <span class="dot" id="dot-3">❄️</span>
  </div>

  <!-- 팝업 -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup">
      <button class="popup-close" id="popupClose">X</button>
      <div class="popup-badge" id="popupZone"></div>
      <h3 class="popup-title" id="popupTitle"></h3>
      <div class="popup-body" id="popupBody"></div>
    </div>
  </div>

  <!-- 스크립트 -->
  <script src="src_plants/plants.js"></script>
  <script src="js/data.js"></script>
  <script src="js/seasons.js"></script>
  <script src="js/loader.js"></script>
  <script src="js/zones.js"></script>
  <script src="js/seasons_page.js"></script>

</body>
</html>
